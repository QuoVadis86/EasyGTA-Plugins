name: Build & Release Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'manifest.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET Framework
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build all plugins
        shell: pwsh
        run: |
          $pluginDirs = Get-ChildItem plugins -Directory
          foreach ($dir in $pluginDirs) {
            $projPath = Join-Path $dir.FullName "$($dir.Name).csproj"
            if (Test-Path $projPath) {
              Write-Host "鏋勫缓: $($dir.Name)..."
              dotnet build -c Release $projPath
            }
          }

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json -Raw | ConvertFrom-Json
          $ver = "1.0.0"
          if ($manifest.plugins) {
            $versions = $manifest.plugins | ForEach-Object { $_.version }
            $sorted = $versions | Sort-Object -Descending
            $ver = $sorted[0]
          }
          echo "tag=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $pluginDirs = Get-ChildItem plugins -Directory
          $assets = @()
          foreach ($dir in $pluginDirs) {
            $dllPath = Join-Path $dir.FullName "bin\Release\net48\$($dir.Name).dll"
            if (Test-Path $dllPath) {
              $assets += ",$dllPath"
            }
          }

          $assetStr = $assets -join ""
          if ($assetStr.Length -gt 0) {
            gh release create "v$tag" `
              --title "Plugins v$tag" `
              --notes "Auto-built plugins" `
              -- $assetStr
          }
